name: Linting & Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        
    - name: Lint with ruff
      run: |
        ruff check .
        
    - name: Run PSScriptAnalyzer
      shell: pwsh
      run: |
        Invoke-ScriptAnalyzer -Path . -Recurse | Where-Object { $_.Severity -eq 'Error' } | ForEach-Object {
          Write-Error "PSScriptAnalyzer Error: $($_.Message) in $($_.ScriptName):$($_.Line)"
        }
